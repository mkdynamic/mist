<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>mist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* rhythm: 1rlh (root line-height, 16px * 1.5625 = 25px, a scootch past gist's
         24px) is the one vertical unit; block margins and heading line-heights are
         rlh multiples. type: Mona Sans (GitHub's face, vendored). colors: Mooncode */
      :root {
        color-scheme: light dark;
      }
      /* forced modes: light-dark() and all colors follow color-scheme */
      :root[data-theme="light"] {
        color-scheme: light;
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
      }
      :root {
        font:
          16px/1.5625 "IBM Plex Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        /* Mooncode values converted to oklch; surface/border L nudged ~1-1.5
           points away from --bg for slightly firmer separation */
        --bg: light-dark(oklch(99.4% 0.001 286), oklch(24.4% 0.01 268));
        --fg: light-dark(oklch(12.3% 0.003 286), oklch(97.6% 0.001 286));
        --muted: light-dark(oklch(55.4% 0.017 278), oklch(73.7% 0.01 315));
        --accent: light-dark(oklch(48.4% 0.084 182), oklch(65.4% 0.116 180));
        --surface: light-dark(oklch(96.8% 0.001 286), oklch(27% 0.014 267));
        --surface-strong: light-dark(
          oklch(94.5% 0.006 264),
          oklch(29.5% 0.019 272)
        );
        --border: light-dark(oklch(89% 0.01 267), oklch(32% 0.017 266));
        --border-variant: light-dark(
          oklch(92.5% 0.007 268),
          oklch(29.5% 0.016 264)
        );
      }
      * {
        margin: 0;
      }
      body {
        background: var(--bg);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      main {
        max-width: 56rem; /* a step narrower than gist's ~950px column */
        margin: 0 auto;
        padding: 3rem 1.25rem 6rem;
      }
      h1 {
        font-size: 2rem;
        line-height: 1.5rlh;
      }
      h2 {
        font-size: 1.5rem;
        line-height: 1.25rlh;
      }
      h3 {
        font-size: 1.25rem;
        line-height: 1rlh;
      }
      h4,
      h5,
      h6 {
        font-size: 1rem;
        line-height: 1rlh;
      }
      h1,
      h2 {
        /* gist's section rules under the two top heading levels */
        padding-bottom: 0.3em;
        border-bottom: 1px solid var(--border-variant);
      }
      /* rhythm scale, two constants: 0.75rlh between all blocks,
         1.5rlh opening a section (collapses with the previous block's 0.75) */
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      p,
      ul,
      ol,
      dl,
      table,
      blockquote,
      .codeblock {
        margin-bottom: 0.75rlh;
      }
      h2,
      h3,
      h4,
      h5,
      h6 {
        margin-top: 1.5rlh;
      }
      main > :first-child {
        margin-top: 0;
      }
      ul,
      ol {
        padding-left: 1.5rem;
      }
      li ul,
      li ol {
        margin-bottom: 0;
      }
      .codeblock {
        position: relative;
      }
      pre {
        background: var(--surface);
        padding: 0.8rem 1rem;
        border-radius: 10px;
        line-height: 1.5;
        overflow-x: auto;
        white-space: pre-wrap;
        overflow-wrap: break-word;
        text-indent: 2ch hanging each-line;
      }
      pre.nowrap {
        white-space: pre;
        text-indent: 0;
      }
      code {
        /* gist's 85% mono scale */
        font:
          0.85em "IBM Plex Mono",
          ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
      }
      :not(pre) > code {
        background: var(--surface-strong);
        padding: 0.2em 0.4em;
        border-radius: 6px;
      }
      img {
        max-width: 100%;
      }
      blockquote {
        padding-left: 1rem;
        border-left: 3px solid var(--border);
        color: var(--muted);
      }
      table {
        border-collapse: collapse;
        line-height: 1rlh;
      }
      th,
      td {
        border: 1px solid var(--border);
        padding: 0.35rem 0.6rem;
      }
      a {
        color: var(--accent);
      }
      hr {
        border: 0;
        border-top: 1px solid var(--border-variant);
        margin-block: 1rlh;
      }

      /* per-code-block controls: bare icons, outside the scroll container, hover/focus reveal */
      .codebar {
        position: absolute;
        top: 0.5rem;
        right: 0.5rem;
        display: flex;
        gap: 0.125rem;
        opacity: 0;
        transition: opacity 120ms;
      }
      .codeblock:hover .codebar,
      .codebar:focus-within {
        opacity: 1;
      }
      .codebar button {
        display: grid;
        place-items: center;
        padding: 0.3rem;
        background: none;
        border: 0;
        border-radius: 6px;
        color: var(--muted);
        cursor: pointer;
      }
      .codebar button:hover {
        color: var(--fg);
      }
      .codebar button[aria-pressed="true"] {
        color: var(--accent);
      }
      .codebar svg {
        width: 0.875rem;
        height: 0.875rem;
        display: block;
      }

      /* corner theme toggle: system -> light -> dark */
      .themetoggle {
        position: fixed;
        top: 0.75rem;
        right: 0.75rem;
        display: grid;
        place-items: center;
        padding: 0.3rem;
        background: none;
        border: 0;
        border-radius: 6px;
        color: var(--muted);
        opacity: 0.55;
        cursor: pointer;
      }
      .themetoggle:hover {
        opacity: 1;
        color: var(--fg);
      }
      .themetoggle svg {
        width: 1rem;
        height: 1rem;
        display: block;
      }

      /* syntax tokens (highlight.js), mapped from Mooncode's syntax palette */
      .hljs-comment,
      .hljs-quote {
        color: light-dark(oklch(55.8% 0.02 279), oklch(74.6% 0.01 315));
      }
      .hljs-keyword,
      .hljs-selector-tag,
      .hljs-doctag,
      .hljs-tag {
        color: light-dark(oklch(45.6% 0.079 182), oklch(65.4% 0.116 180));
      }
      .hljs-string,
      .hljs-regexp,
      .hljs-symbol,
      .hljs-char.escape_ {
        color: light-dark(oklch(48.3% 0.102 71), oklch(76.2% 0.162 70));
      }
      .hljs-title,
      .hljs-name {
        color: light-dark(oklch(38.9% 0.077 96), oklch(91.9% 0.143 98));
      }
      .hljs-type,
      .hljs-built_in,
      .hljs-title.class_ {
        color: light-dark(oklch(42.8% 0.079 178), oklch(83% 0.153 177));
      }
      .hljs-number,
      .hljs-literal {
        color: light-dark(oklch(45.8% 0.118 138), oklch(83.1% 0.161 136));
      }
      .hljs-attr,
      .hljs-attribute,
      .hljs-property,
      .hljs-selector-class,
      .hljs-selector-id,
      .hljs-variable,
      .hljs-template-variable {
        color: light-dark(oklch(45.9% 0.08 182), oklch(65.4% 0.116 180));
      }
      .hljs-operator {
        color: light-dark(oklch(50% 0.107 69), oklch(76.2% 0.162 70));
      }
      .hljs-meta {
        color: light-dark(oklch(49.1% 0.024 274), oklch(87.7% 0.009 308));
      }
      .hljs-section {
        color: light-dark(oklch(39.1% 0.018 268), oklch(97.6% 0.001 286));
        font-weight: 700;
      }
      .hljs-emphasis {
        font-style: italic;
      }
      .hljs-strong {
        font-weight: 700;
      }
      .hljs-addition {
        color: light-dark(oklch(54% 0.142 139), oklch(83.1% 0.161 136));
        background: light-dark(oklch(92.3% 0.05 136), oklch(35% 0.09 143));
      }
      .hljs-deletion {
        color: light-dark(oklch(58.3% 0.225 8), oklch(64.1% 0.238 8));
        background: light-dark(oklch(90.9% 0.039 4), oklch(28.9% 0.109 13));
      }
    </style>
    
  <script type="module" crossorigin src="./index-2t8brm4a.js"></script></head>
  <body>
    <main id="doc"></main>
  </body>
</html>
