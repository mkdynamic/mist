<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>mist</title>
    <style>
      /* rhythm: 1rlh (root line-height, 16px * 1.5625 = 25px, a scootch past gist's
         24px) is the one vertical unit; block margins and heading line-heights are
         rlh multiples. colors: JetBrains Islands light/dark */
      :root {
        color-scheme: light dark;
      }
      /* forced modes: light-dark() and all colors follow color-scheme */
      :root[data-theme="light"] {
        color-scheme: light;
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
      }
      :root {
        font:
          17.5px/1.7143 -apple-system,
          BlinkMacSystemFont,
          system-ui,
          "Segoe UI",
          sans-serif;
        /* JetBrains Islands: page carries the editor background, code blocks
           the surface */
        --bg: light-dark(#ffffff, #191a1c);
        --fg: light-dark(#080808, #dfe1e5);
        --muted: light-dark(#404040, #b0b1b3);
        --accent: light-dark(#006dcc, #56a8f5);
        --surface: light-dark(#f5f7f9, #26282b);
        --surface-strong: light-dark(#e3e3e5, #393b41);
        --border: light-dark(#e9eaee, #26282c);
        --border-variant: light-dark(#e9ebee, #1e2023);
      }
      * {
        margin: 0;
      }
      body {
        background: var(--bg);
        color: var(--fg);
        text-wrap: pretty;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* open sidebar pushes content, in step with the drawer slide */
        transition: padding-left 200ms ease;
      }
      :root.toc-open body {
        padding-left: 16rem;
      }
      pre,
      code {
        text-wrap: auto;
      }
      main {
        max-width: 47.5rem; /* ~830px at the 17.5px root */
        margin: 0 auto;
        padding: 3rem 1.25rem 6rem;
      }
      h1 {
        font-size: 2rem;
        line-height: 1.5rlh;
      }
      h2 {
        font-size: 1.5rem;
        line-height: 1.25rlh;
      }
      h3 {
        font-size: 1.25rem;
        line-height: 1rlh;
      }
      h4,
      h5,
      h6 {
        font-size: 1rem;
        line-height: 1rlh;
      }
      /* rhythm scale, two constants: 0.75rlh between all blocks,
         1.5rlh opening a section (collapses with the previous block's 0.75) */
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      p,
      ul,
      ol,
      dl,
      table,
      blockquote,
      .codeblock {
        margin-bottom: 0.75rlh;
      }
      h2,
      h3,
      h4,
      h5,
      h6 {
        margin-top: 1.5rlh;
      }
      main > :first-child {
        margin-top: 0;
      }
      ul,
      ol {
        padding-left: 1.5rem;
      }
      li ul,
      li ol {
        margin-bottom: 0;
      }
      .codeblock {
        position: relative;
      }
      pre {
        background: var(--surface);
        /* editor.foreground: code prose sits a step dimmer than page text in dark */
        color: light-dark(#080808, #bcbec4);
        padding: 0.8rem 1rem;
        border-radius: 10px;
        line-height: 1.5;
        overflow-x: auto;
        white-space: pre-wrap;
        overflow-wrap: break-word;
        text-indent: 2ch hanging each-line;
      }
      pre.nowrap {
        white-space: pre;
        text-indent: 0;
      }
      code {
        /* gist's 85% mono scale */
        font:
          0.85em ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
      }
      :not(pre) > code {
        background: var(--surface-strong);
        padding: 0.2em 0.4em;
        border-radius: 6px;
      }
      img {
        max-width: 100%;
      }
      blockquote {
        position: relative;
        padding-left: 1.1rem;
        /* a smidge further from body text than --muted */
        color: light-dark(#4e5157, #a5a7ab);
      }
      blockquote::before {
        /* pill-ended bar; a step past --border toward --muted so it reads on both grounds */
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        border-radius: 2px;
        background: light-dark(#e5e7ec, #34373c);
      }
      table {
        border-collapse: collapse;
        line-height: 1rlh;
      }
      th,
      td {
        border: 1px solid var(--border);
        padding: 0.35rem 0.6rem;
      }
      a {
        color: var(--accent);
      }
      hr {
        border: 0;
        border-top: 1px solid var(--border-variant);
        margin-block: 1rlh;
      }

      /* per-code-block controls: bare icons, outside the scroll container, hover/focus reveal */
      .codebar {
        position: absolute;
        top: 0.5rem;
        right: 0.5rem;
        display: flex;
        gap: 0.125rem;
        opacity: 0;
        transition: opacity 120ms;
      }
      .codeblock:hover .codebar,
      .codebar:focus-within {
        opacity: 1;
      }
      .codebar button {
        display: grid;
        place-items: center;
        padding: 0.3rem;
        background: none;
        border: 0;
        border-radius: 6px;
        color: var(--muted);
        cursor: pointer;
      }
      .codebar button:hover {
        color: var(--fg);
      }
      .codebar button[aria-pressed="true"] {
        color: var(--accent);
      }
      .codebar svg {
        width: 0.875rem;
        height: 0.875rem;
        display: block;
      }

      /* right-edge outline rail: one line per heading, width by depth */
      .outline {
        position: fixed;
        top: 50%;
        right: 1.25rem;
        translate: 0 -50%;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0;
      }
      .outline button {
        display: block;
        /* hit areas tile with no dead space: half the visual gap as padding on
           each side, plus leftward slop; the 2px line is the clipped content box */
        box-sizing: content-box;
        height: 2px;
        padding: 0.4rem 0 0.4rem 0.75rem;
        border: 0;
        background: var(--surface-strong);
        background-clip: content-box;
        cursor: pointer;
        transition: background 120ms;
      }
      .outline button:hover {
        background-color: var(--muted);
      }
      .outline button[aria-current="true"] {
        background-color: light-dark(#b6b9c0, #55585e);
      }
      .outline .l1 {
        width: 1.5rem;
      }
      .outline .l2 {
        width: 1rem;
      }
      .outline .l3 {
        width: 0.5rem;
      }
      @media (max-width: 78rem) {
        .outline {
          display: none;
        }
      }
      h1,
      h2,
      h3 {
        scroll-margin-top: 1rlh;
      }

      /* outline toggle, mirror of the theme toggle */
      .toctoggle {
        position: fixed;
        top: 0.75rem;
        left: 0.75rem;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 0.3rem;
        background: none;
        border: 0;
        border-radius: 6px;
        color: var(--muted);
        opacity: 0.55;
        cursor: pointer;
      }
      .toctoggle:hover,
      .toctoggle[aria-expanded="true"] {
        opacity: 1;
        color: var(--fg);
      }
      .toctoggle svg {
        width: 1rem;
        height: 1rem;
        display: block;
      }
      /* outline drawer: full-height, slides from the left edge */
      .toc {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 20;
        width: 16rem;
        box-sizing: border-box;
        /* list sits below the toggle, left-aligned with its glyph */
        padding: 3.35rem 1.25rem 1.5rem 1.175rem;
        background: var(--surface);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        translate: -100% 0;
        visibility: hidden;
        transition:
          translate 200ms ease,
          visibility 200ms;
      }
      .toc.open {
        translate: 0 0;
        visibility: visible;
      }
      .toc button {
        display: block;
        width: 100%;
        padding: 0;
        background: none;
        border: 0;
        font-size: 0.8rem;
        line-height: 1.3;
        text-align: left;
        color: var(--muted);
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .toc button:hover {
        color: var(--fg);
      }
      .toc button[aria-current="true"] {
        color: var(--fg);
        font-weight: 600;
      }
      .toc .l2 {
        padding-left: 0.75rem;
      }
      .toc .l3 {
        padding-left: 1.5rem;
      }

      /* corner theme toggle: system -> light -> dark */
      .themetoggle {
        position: fixed;
        top: 0.75rem;
        right: 0.75rem;
        display: grid;
        place-items: center;
        padding: 0.3rem;
        background: none;
        border: 0;
        border-radius: 6px;
        color: var(--muted);
        opacity: 0.55;
        cursor: pointer;
      }
      .themetoggle:hover {
        opacity: 1;
        color: var(--fg);
      }
      .themetoggle svg {
        width: 1rem;
        height: 1rem;
        display: block;
      }

      /* syntax tokens (highlight.js), mapped from JetBrains Islands syntax palette */
      .hljs-comment,
      .hljs-quote {
        color: light-dark(#8c8c8c, #7a7e85);
      }
      .hljs-keyword,
      .hljs-doctag {
        color: light-dark(#0033b3, #cf8e6d);
      }
      .hljs-tag,
      .hljs-selector-tag {
        color: light-dark(#0033b3, #d5b778);
      }
      .hljs-string,
      .hljs-regexp,
      .hljs-symbol {
        color: light-dark(#067d17, #6aab73);
      }
      .hljs-char.escape_ {
        color: light-dark(#0037a6, #cf8e6d);
      }
      .hljs-title,
      .hljs-name {
        color: light-dark(#00627a, #56a8f5);
      }
      .hljs-type,
      .hljs-title.class_ {
        color: light-dark(#a04908, #86985d);
      }
      .hljs-built_in {
        color: light-dark(#0033b3, #cf8e6d);
      }
      .hljs-number,
      .hljs-literal {
        color: light-dark(#1750eb, #2aacb8);
      }
      .hljs-attr,
      .hljs-attribute,
      .hljs-property,
      .hljs-selector-class,
      .hljs-selector-id {
        color: light-dark(#871094, #c77dbb);
      }
      .hljs-variable,
      .hljs-template-variable {
        color: light-dark(#000000, #bcbec4);
      }
      .hljs-operator {
        color: light-dark(#080808, #bcbec4);
      }
      .hljs-meta {
        color: light-dark(#9e880d, #b3ae60);
      }
      .hljs-section {
        color: light-dark(#871094, #c77dbb);
        font-weight: 700;
      }
      .hljs-emphasis {
        font-style: italic;
      }
      .hljs-strong {
        font-weight: 700;
      }
      .hljs-addition {
        color: light-dark(oklch(54% 0.142 139), oklch(83.1% 0.161 136));
        background: light-dark(oklch(92.3% 0.05 136), oklch(35% 0.09 143));
      }
      .hljs-deletion {
        color: light-dark(oklch(58.3% 0.225 8), oklch(64.1% 0.238 8));
        background: light-dark(oklch(90.9% 0.039 4), oklch(28.9% 0.109 13));
      }
    </style>

    <main id="doc"></main>
